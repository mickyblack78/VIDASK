<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMGASK</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00cae3; 
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        h1 { font-size: 1.5rem; margin-bottom: 8px; text-align: center; color: var(--accent); }
        .subtitle { font-size: 0.85rem; color: var(--text-dim); text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 0.9rem; display: block; margin-top: 15px; margin-bottom: 8px; }
        textarea { width: 100%; height: 100px; background: #2a2a2a; border: 2px solid #3a3a3a; border-radius: 8px; color: #fff; padding: 12px; font-size: 1rem; resize: none; outline: none; transition: border-color 0.2s; }
        textarea:focus { border-color: var(--accent); }
        select { width: 100%; background: #2a2a2a; border: 2px solid #3a3a3a; border-radius: 8px; color: #fff; padding: 12px; font-size: 1rem; outline: none; }
        select:focus { border-color: var(--accent); }
        input[type="password"] { width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; color: #fff; padding: 10px; font-size: 0.9rem; margin-top: 5px; }
        button { width: 100%; background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-top: 25px; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .output-box { margin-top: 25px; text-align: center; display: none; }
        img { width: 100%; border-radius: 8px; background: #000; margin-top: 10px; border: 1px solid #333; }
        .loader { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        .status-text { font-size: 0.9rem; color: var(--accent); margin-top: 8px; text-align: center; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #ff5252; font-size: 0.9rem; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>IMGASK</h1>
    <div class="subtitle">Multi-Engine Text-to-Image Hub</div>

    <label for="engineSelect">Choose Image AI Engine:</label>
    <select id="engineSelect">
        <option value="black-forest-labs/FLUX.1-schnell">Engine 1: FLUX.1 Schnell (Ultra-Fast & Realistic)</option>
        <option value="stabilityai/stable-diffusion-3.5-large">Engine 2: Stable Diffusion 3.5 Large</option>
        <option value="black-forest-labs/FLUX.1-dev">Engine 3: FLUX.1 Dev</option>
    </select>

    <label for="prompt">Enter Image Prompt:</label>
    <textarea id="prompt" placeholder="e.g., A cinematic shot of a neon butterfly in a dark forest, 4k..."></textarea>

    <div class="api-group">
        <label for="token">Hugging Face API Token:</label>
        <input type="password" id="token" placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
    </div>

    <button id="generateBtn" onclick="generateImage()">Generate Image</button>

    <div class="loader" id="loader"></div>
    <div class="status-text" id="status"></div>
    <div class="error" id="error"></div>

    <div class="output-box" id="outputBox">
        <label>Your Generated Image:</label>
        <img id="imageDisplay" alt="AI Generated Output">
        <a id="downloadLink" href="#" download="ai_image.png" style="display: block; margin-top: 12px; color: var(--accent); font-size: 0.9rem; text-decoration: none; font-weight: bold;">Save Image to Device</a>
    </div>
</div>

<script>
    async function generateImage() {
        const prompt = document.getElementById('prompt').value.trim();
        const token = document.getElementById('token').value.trim();
        const selectedModel = document.getElementById('engineSelect').value;
        const btn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const errorDiv = document.getElementById('error');
        const outputBox = document.getElementById('outputBox');
        const imageDisplay = document.getElementById('imageDisplay');
        const downloadLink = document.getElementById('downloadLink');

        errorDiv.innerText = "";
        outputBox.style.display = "none";

        if (!prompt) {
            errorDiv.innerText = "Please enter a visual text prompt.";
            return;
        }
        if (!token) {
            errorDiv.innerText = "Please enter your free Hugging Face API token.";
            return;
        }

        btn.disabled = true;
        loader.style.display = "block";
        status.innerText = "Processing image request...";

        try {
            const apiEndpoint = `https://api-inference.huggingface.co/models/${selectedModel}`;

            const response = await fetch(
                apiEndpoint,
                {
                    headers: { 
                        Authorization: `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({ inputs: prompt }),
                }
            );

            if (!response.ok) {
                if (response.status === 503) {
                    throw new Error("Model is loading in the cloud. Wait 10 seconds and try clicking generate again!");
                }
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error || `Engine Error (Status ${response.status})`);
            }

            const blob = await response.blob();
            const imageUrl = URL.createObjectURL(blob);
            
            imageDisplay.src = imageUrl;
            downloadLink.href = imageUrl;
            
            loader.style.display = "none";
            status.innerText = "";
            outputBox.style.display = "block";

        } catch (err) {
            loader.style.display = "none";
            status.innerText = "";
            errorDiv.innerText = err.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
