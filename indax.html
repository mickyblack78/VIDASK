<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto G35 Video AI</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00cae3; /* Motorola-style teal */
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        h1 { font-size: 1.5rem; margin-bottom: 8px; text-align: center; color: var(--accent); }
        .subtitle { font-size: 0.85rem; color: var(--text-dim); text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 8px; }
        textarea { width: 100%; height: 100px; background: #2a2a2a; border: 2px solid #3a3a3a; border-radius: 8px; color: #fff; padding: 12px; font-size: 1rem; resize: none; outline: none; transition: border-color 0.2s; }
        textarea:focus { border-color: var(--accent); }
        .api-group { margin-top: 15px; }
        input[type="password"] { width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; color: #fff; padding: 10px; font-size: 0.9rem; margin-top: 5px; }
        button { width: 100%; background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-top: 20px; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .output-box { margin-top: 25px; text-align: center; display: none; }
        video { width: 100%; border-radius: 8px; background: #000; margin-top: 10px; border: 1px solid #333; }
        .loader { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        .status-text { font-size: 0.9rem; color: var(--accent); margin-top: 8px; text-align: center; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #ff5252; font-size: 0.9rem; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Moto G35 Video AI</h1>
    <div class="subtitle">Cloud-accelerated Text-to-Video Engine</div>

    <label for="prompt">Enter Video Prompt:</label>
    <textarea id="prompt" placeholder="e.g., A red ball bouncing down a futuristic neon city street, 4k, cinematic..."></textarea>

    <div class="api-group">
        <label for="token">Hugging Face API Token (<a href="https://huggingface.co" target="_blank" style="color: var(--accent); text-decoration: none;">Get Free Token</a>):</label>
        <input type="password" id="token" placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
    </div>

    <button id="generateBtn" onclick="generateVideo()">Generate Video</button>

    <div class="loader" id="loader"></div>
    <div class="status-text" id="status"></div>
    <div class="error" id="error"></div>

    <div class="output-box" id="outputBox">
        <label>Your Generated Video:</label>
        <video id="videoPlayer" controls playsinline></video>
        <a id="downloadLink" href="#" download="ai_video.mp4" style="display: block; margin-top: 12px; color: var(--accent); font-size: 0.9rem; text-decoration: none; font-weight: bold;">Save Video to Device</a>
    </div>
</div>

<script>
    async function generateVideo() {
        const prompt = document.getElementById('prompt').value.trim();
        const token = document.getElementById('token').value.trim();
        const btn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const errorDiv = document.getElementById('error');
        const outputBox = document.getElementById('outputBox');
        const videoPlayer = document.getElementById('videoPlayer');
        const downloadLink = document.getElementById('downloadLink');

        // Reset views
        errorDiv.innerText = "";
        outputBox.style.display = "none";

        if (!prompt) {
            errorDiv.innerText = "Please enter a visual text prompt.";
            return;
        }
        if (!token) {
            errorDiv.innerText = "Please enter your free Hugging Face API token.";
            return;
        }

        // Lock UI & Start Loader
        btn.disabled = true;
        loader.style.display = "block";
        status.innerText = "Connecting to AI cluster... (May take 1-2 mins)";

        try {
            // Using the open-source model: Damo-vilab Text-to-Video
            const response = await fetch(
                "https://huggingface.co",
                {
                    headers: { 
                        Authorization: `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({ inputs: prompt }),
                }
            );

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                if (response.status === 503) {
                    throw new Error("Model is currently loading in the cloud. Please wait a few seconds and tap Generate again.");
                }
                throw new Error(errData.error || `Server Error (Status ${response.status})`);
            }

            status.innerText = "Compiling video container...";
            const blob = await response.blob();
            const videoUrl = URL.createObjectURL(blob);
            
            // Inject stream into video player
            videoPlayer.src = videoUrl;
            downloadLink.href = videoUrl;
            
            // Show result
            loader.style.display = "none";
            status.innerText = "";
            outputBox.style.display = "block";
            videoPlayer.load();
            videoPlayer.play();

        } catch (err) {
            loader.style.display = "none";
            status.innerText = "";
            errorDiv.innerText = err.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
